<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qualitty Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #111111;
      min-height: 100vh;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 72px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #efefef;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 1000;
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #111;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .icon-btn:hover {
      background: #f5f5f5;
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      stroke: #111;
    }

    main {
      padding-top: 110px;
      padding-left: 20px;
      padding-right: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero {
      border-radius: 32px;
      background: linear-gradient(135deg, #f8f8f8, #efefef);
      padding: 60px 34px;
      min-height: 360px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      overflow: hidden;
      position: relative;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.05;
      letter-spacing: -2px;
      max-width: 600px;
    }

    .hero p {
      font-size: 16px;
      color: #666;
      max-width: 520px;
      line-height: 1.7;
    }

    .hero button {
      width: fit-content;
      padding: 14px 22px;
      border: none;
      border-radius: 14px;
      background: #111;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .hero button:hover {
      opacity: 0.92;
    }

    .products {
      margin-top: 32px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 24px;
      overflow: hidden;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .card-image {
      height: 240px;
      background: #f7f7f7;
    }

    .card-content {
      padding: 18px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card-price {
      color: #666;
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .products {
        grid-template-columns: repeat(2, 1fr);
      }

      .hero h1 {
        font-size: 34px;
      }
    }

    @media (max-width: 600px) {
      header {
        height: 68px;
        padding: 0 16px;
      }

      .logo {
        font-size: 19px;
      }

      .icon-btn {
        width: 38px;
        height: 38px;
      }

      main {
        padding-top: 95px;
        padding-left: 16px;
        padding-right: 16px;
      }

      .hero {
        padding: 36px 22px;
        min-height: 280px;
        border-radius: 26px;
      }

      .hero h1 {
        font-size: 30px;
        letter-spacing: -1.5px;
      }

      .hero p {
        font-size: 15px;
      }

      .products {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .card-image {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Qualitty Store</div>

    <div class="header-actions">
      <button class="icon-btn" aria-label="Пошук">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20L17 17"></path>
        </svg>
      </button>

      <button class="icon-btn" aria-label="Кошик">
        <svg fill="none" viewBox="0 0 24 24" stroke-width="2">
          <path d="M3 5h2l2 10h10l2-7H7"></path>
          <circle cx="10" cy="19" r="1"></circle>
          <circle cx="17" cy="19" r="1"></circle>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h1>Нова колекція у сучасному мінімалістичному стилі.</h1>

      <p>
        Акуратний преміальний дизайн без перевантаження та зайвих деталей.
      </p>

      <button>Переглянути товари</button>
    </section>

    <section class="products">
      <div class="card">
        <div class="card-image"></div>
        <div class="card-content">
          <div class="card-title">Premium Hoodie</div>
          <div class="card-price">₴2 499</div>
        </div>
      </div>

      <div class="card">
        <div class="card-image"></div>
        <div class="card-content">
          <div class="card-title">Minimal Sneakers</div>
          <div class="card-price">₴4 199</div>
        </div>
      </div>

      <div class="card">
        <div class="card-image"></div>
        <div class="card-content">
          <div class="card-title">Classic T-Shirt</div>
          <div class="card-price">₴1 299</div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
